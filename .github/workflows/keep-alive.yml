name: Keep Backend Alive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    name: Ping Render Backend
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping /health endpoint
        run: |
          echo "Pingando o backend em: ${{ secrets.RENDER_BACKEND_URL }}/health"

          RESPONSE=$(curl \
            --silent \
            --write-out "\n%{http_code}" \
            --max-time 60 \
            "${{ secrets.RENDER_BACKEND_URL }}/health")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status : $HTTP_CODE"
          echo "Response    : $BODY"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Backend retornou HTTP $HTTP_CODE — verifique o serviço no Render."
            exit 1
          fi

          echo "Backend está acordado e saudável!"
