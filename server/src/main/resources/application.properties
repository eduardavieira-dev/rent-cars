micronaut.security.token.jwt.signatures.secret.generator.secret=${JWT_GENERATOR_SIGNATURE_SECRET}
datasources.default.db-type=postgres
datasources.default.dialect=POSTGRES
micronaut.application.name=rentcars
micronaut.server.port=${APP_PORT\:8080}
micronaut.test.resources.enabled=false
micronaut.security.enabled=${SECURITY_ENABLED:true}
micronaut.server.cors.enabled=true
micronaut.server.cors.configurations.frontend.allowed-origins=https://seu-frontend-no-vercel.vercel.app,http://localhost:3000
micronaut.server.cors.configurations.frontend.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
micronaut.server.cors.configurations.frontend.allowed-headers=Content-Type,Authorization
micronaut.server.cors.configurations.frontend.allow-credentials=true
micronaut.security.intercept-url-map[0].pattern=/health
micronaut.security.intercept-url-map[0].http-method=GET
micronaut.security.intercept-url-map[0].access[0]=isAnonymous()
micronaut.security.intercept-url-map[1].pattern=/**
micronaut.security.intercept-url-map[1].http-method=OPTIONS
micronaut.security.intercept-url-map[1].access[0]=isAnonymous()
jpa.default.properties.hibernate.hbm2ddl.auto=update
micronaut.security.authentication=bearer
datasources.default.driver-class-name=org.postgresql.Driver
datasources.default.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:rentcars}
datasources.default.username=${DB_USER}
datasources.default.password=${DB_PASSWORD}
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
micronaut.server.multipart.max-file-size=10485760
micronaut.server.max-request-size=10485760
